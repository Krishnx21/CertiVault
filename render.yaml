version: "1"

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: certivault-backend
    runtime: node
    region: oregon
    plan: free

    # All commands run from the repo root, so prefix with the subdirectory
    rootDir: backend

    buildCommand: npm ci && npm run build
    startCommand: node dist/server.js

    # Health-check — Render will restart the instance if this path stops responding
    healthCheckPath: /health/live

    envVars:
      - key: NODE_ENV
        value: production

      # ── Required — set these in the Render dashboard ─────────────────────
      # MONGODB_URI          (MongoDB Atlas connection string)
      # JWT_ACCESS_SECRET    (min 32 chars)
      # JWT_REFRESH_SECRET   (min 32 chars)
      # FRONTEND_ORIGIN      (e.g. https://certivault.onrender.com)
      # REDIS_URL            (e.g. redis://default:password@host:port)

      # ── Optional ─────────────────────────────────────────────────────────
      # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION / AWS_S3_BUCKET
      # CLOUDINARY_CLOUD_NAME / CLOUDINARY_API_KEY / CLOUDINARY_API_SECRET
      # RESEND_API_KEY
      # SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / EMAIL_FROM
      # GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET / GOOGLE_CALLBACK_URL
      # BULL_BOARD_USERNAME / BULL_BOARD_PASSWORD
