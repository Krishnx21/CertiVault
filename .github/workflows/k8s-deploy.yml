# =============================================================================
# CertiVault — Kubernetes Deployment
# =============================================================================
# Triggers on GitHub Release published.
# Updates the backend + frontend + workers deployments in the cluster
# using a rolling image update (kubectl set image) — zero downtime.
#
# Required repository secrets:
#   KUBECONFIG          → base64-encoded kubeconfig file for the cluster
#                         Generate: cat ~/.kube/config | base64 -w0
#   KUBE_NAMESPACE      → target namespace (default: certivault)
#
# The workflow:
#   1. Authenticates to the cluster via KUBECONFIG
#   2. Sets the new image tag on all three deployments
#   3. Waits for rollout to complete (readiness probe must pass)
#   4. Rolls back automatically if rollout times out (5 min)
#   5. Writes a deployment summary to the Actions run page
# =============================================================================

name: Kubernetes Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. v1.2.0 or a git SHA)"
        required: true
        default: "latest"

concurrency:
  # Only one deploy at a time — queue them, don't cancel
  group: k8s-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://certivault.example.com   # update to real domain

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Determine image tag ─────────────────────────────────────────────────
      # On release: use the git tag (e.g. v1.2.0)
      # On manual dispatch: use the provided input
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          # Strip leading 'v' for Docker tag compatibility
          CLEAN_TAG="${TAG#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "clean_tag=${CLEAN_TAG}" >> $GITHUB_OUTPUT
          echo "Deploying tag: ${TAG} (clean: ${CLEAN_TAG})"

      # ── Configure kubectl ───────────────────────────────────────────────────
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connection
        run: kubectl cluster-info --request-timeout=10s

      # ── Set the namespace ───────────────────────────────────────────────────
      - name: Set namespace
        id: ns
        run: |
          NS="${{ secrets.KUBE_NAMESPACE }}"
          echo "namespace=${NS:-certivault}" >> $GITHUB_OUTPUT

      # ── Verify images exist in GHCR before deploying ────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify backend image exists
        run: |
          docker manifest inspect ghcr.io/krishnx21/certivault-backend:${{ steps.tag.outputs.clean_tag }} \
            || (echo "ERROR: backend image tag ${{ steps.tag.outputs.clean_tag }} not found in GHCR" && exit 1)

      - name: Verify frontend image exists
        run: |
          docker manifest inspect ghcr.io/krishnx21/certivault-frontend:${{ steps.tag.outputs.clean_tag }} \
            || (echo "ERROR: frontend image tag ${{ steps.tag.outputs.clean_tag }} not found in GHCR" && exit 1)

      # ── Rolling update ──────────────────────────────────────────────────────
      - name: Update backend image
        run: |
          kubectl set image deployment/certivault-backend \
            backend=ghcr.io/krishnx21/certivault-backend:${{ steps.tag.outputs.clean_tag }} \
            -n ${{ steps.ns.outputs.namespace }}

      - name: Update frontend image
        run: |
          kubectl set image deployment/certivault-frontend \
            frontend=ghcr.io/krishnx21/certivault-frontend:${{ steps.tag.outputs.clean_tag }} \
            -n ${{ steps.ns.outputs.namespace }}

      - name: Update workers image
        run: |
          kubectl set image deployment/certivault-workers \
            workers=ghcr.io/krishnx21/certivault-backend:${{ steps.tag.outputs.clean_tag }} \
            -n ${{ steps.ns.outputs.namespace }}

      # ── Wait for rollouts ───────────────────────────────────────────────────
      - name: Wait for backend rollout
        id: rollout-backend
        run: |
          kubectl rollout status deployment/certivault-backend \
            -n ${{ steps.ns.outputs.namespace }} \
            --timeout=300s

      - name: Wait for frontend rollout
        id: rollout-frontend
        run: |
          kubectl rollout status deployment/certivault-frontend \
            -n ${{ steps.ns.outputs.namespace }} \
            --timeout=300s

      - name: Wait for workers rollout
        id: rollout-workers
        run: |
          kubectl rollout status deployment/certivault-workers \
            -n ${{ steps.ns.outputs.namespace }} \
            --timeout=300s

      # ── Automatic rollback on failure ───────────────────────────────────────
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back all deployments..."
          kubectl rollout undo deployment/certivault-backend -n ${{ steps.ns.outputs.namespace }} || true
          kubectl rollout undo deployment/certivault-frontend -n ${{ steps.ns.outputs.namespace }} || true
          kubectl rollout undo deployment/certivault-workers  -n ${{ steps.ns.outputs.namespace }} || true
          echo "Rollback complete."

      # ── Verify pods are healthy after rollout ───────────────────────────────
      - name: Verify pod health
        run: |
          kubectl get pods -n ${{ steps.ns.outputs.namespace }} -l app.kubernetes.io/name=certivault
          # Fail if any pod is not in Running/Completed state
          FAILING=$(kubectl get pods -n ${{ steps.ns.outputs.namespace }} \
            -l app.kubernetes.io/name=certivault \
            --field-selector=status.phase!=Running,status.phase!=Succeeded \
            --no-headers | wc -l)
          if [ "$FAILING" -gt "0" ]; then
            echo "ERROR: $FAILING pod(s) are not healthy"
            kubectl get pods -n ${{ steps.ns.outputs.namespace }}
            exit 1
          fi
          echo "All pods are healthy."

      # ── Deployment summary ──────────────────────────────────────────────────
      - name: Write deployment summary
        if: always()
        run: |
          echo "## Kubernetes Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ steps.ns.outputs.namespace }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ steps.rollout-backend.outcome == 'success' && '✅ rolled out' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ steps.rollout-frontend.outcome == 'success' && '✅ rolled out' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workers | ${{ steps.rollout-workers.outcome == 'success' && '✅ rolled out' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
