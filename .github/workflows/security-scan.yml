# =============================================================================
# CertiVault — Container Image Security Scanning (Trivy)
# =============================================================================
# The existing security.yml already runs Trivy against the FILESYSTEM.
# This workflow complements it by scanning the BUILT DOCKER IMAGES
# (OS packages, npm dependencies inside the image, and embedded secrets).
#
# Triggers:
#   push to main          → scans images built from this commit
#   pull_request to main  → scans images to catch issues before merge
#   schedule (weekly)     → catches newly-disclosed CVEs in unchanged images
#   workflow_dispatch     → manual trigger
#
# Required secrets: none (uses GITHUB_TOKEN for GHCR pull)
#
# Fail behaviour:
#   CRITICAL severity in image deps → step is marked failed (continue-on-error
#   keeps the rest of the pipeline running so SARIF always gets uploaded)
#   Results always uploaded to GitHub Security Advisories (SARIF)
# =============================================================================

name: Container Security Scan

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "nginx/**"
      - ".github/workflows/security-scan.yml"
  pull_request:
    branches: [main]
  schedule:
    # Every Monday at 04:00 UTC — catches newly-disclosed CVEs
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read           # pull images from GHCR
  security-events: write   # upload SARIF to GitHub Security tab

jobs:
  # ===========================================================================
  # Build images locally (no push) and scan them
  # This is separate from docker-build.yml — we build just to scan,
  # not to push. This lets PRs get scanned without pushing images.
  # ===========================================================================
  scan-backend:
    name: Scan Backend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image locally (load into daemon) — no push
      - name: Build backend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          platforms: linux/amd64
          load: true
          push: false
          tags: certivault-backend:scan
          cache-from: type=registry,ref=ghcr.io/krishnx21/certivault-backend:buildcache
        continue-on-error: true   # if image fails to build, scan still runs on fs

      # ── Scan 1: OS + language packages inside the container image ──────────
      # continue-on-error: true so that a CVE hit doesn't block the dep scan
      # steps below from running (and producing their SARIF files).
      # The step is still marked red in the UI when exit-code: "1" fires.
      - name: Trivy — image scan (OS + npm packages)
        id: image_scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: certivault-backend:scan
          format: sarif
          output: trivy-backend-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          vuln-type: os,library
          ignore-unfixed: true   # skip CVEs with no fix available (reduces noise)

      - name: Upload backend image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend-image.sarif
          category: container-backend

      # ── Scan 2: Secrets embedded in the image filesystem ───────────────────
      - name: Trivy — secret scan (backend image)
        id: secret_scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: certivault-backend:scan
          format: table
          exit-code: "1"
          scanners: secret

      # ── Scan 3: npm dependencies (source tree — fast, no Docker needed) ────
      - name: Trivy — backend npm dependency scan
        id: deps_scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: ./backend
          format: sarif
          output: trivy-backend-deps.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          scanners: vuln
          vuln-type: library

      - name: Upload backend dependency scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend-deps.sarif
          category: deps-backend

      # ── Final gate: fail the job if any scan found issues ──────────────────
      # Reads the outcomes of the continue-on-error steps and fails the job
      # explicitly, so PRs are still blocked when real findings exist.
      - name: Fail job if any scan found vulnerabilities
        if: always()
        run: |
          failed=0
          if [ "${{ steps.image_scan.outcome }}" = "failure" ]; then
            echo "::error::Backend image scan found CRITICAL/HIGH vulnerabilities"
            failed=1
          fi
          if [ "${{ steps.secret_scan.outcome }}" = "failure" ]; then
            echo "::error::Backend secret scan found embedded secrets"
            failed=1
          fi
          if [ "${{ steps.deps_scan.outcome }}" = "failure" ]; then
            echo "::error::Backend dependency scan found CRITICAL/HIGH vulnerabilities"
            failed=1
          fi
          exit $failed

  scan-frontend:
    name: Scan Frontend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          target: production
          platforms: linux/amd64
          load: true
          push: false
          tags: certivault-frontend:scan
          cache-from: type=registry,ref=ghcr.io/krishnx21/certivault-frontend:buildcache
        continue-on-error: true

      - name: Trivy — image scan (OS + npm packages)
        id: image_scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: certivault-frontend:scan
          format: sarif
          output: trivy-frontend-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          vuln-type: os,library
          ignore-unfixed: true

      - name: Upload frontend image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend-image.sarif
          category: container-frontend

      - name: Trivy — frontend npm dependency scan
        id: deps_scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: ./frontend
          format: sarif
          output: trivy-frontend-deps.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          scanners: vuln
          vuln-type: library

      - name: Upload frontend dependency scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend-deps.sarif
          category: deps-frontend

      - name: Fail job if any scan found vulnerabilities
        if: always()
        run: |
          failed=0
          if [ "${{ steps.image_scan.outcome }}" = "failure" ]; then
            echo "::error::Frontend image scan found CRITICAL/HIGH vulnerabilities"
            failed=1
          fi
          if [ "${{ steps.deps_scan.outcome }}" = "failure" ]; then
            echo "::error::Frontend dependency scan found CRITICAL/HIGH vulnerabilities"
            failed=1
          fi
          exit $failed

  # ===========================================================================
  # Generate consolidated security report as a job summary
  # ===========================================================================
  security-report:
    name: Security Report Summary
    runs-on: ubuntu-latest
    needs: [scan-backend, scan-frontend]
    if: always()

    steps:
      - name: Write security summary
        run: |
          echo "## Container Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend image | ${{ needs.scan-backend.result == 'success' && '✅ clean' || '⚠️ issues found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend image | ${{ needs.scan-frontend.result == 'success' && '✅ clean' || '⚠️ issues found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full results visible in the [Security tab](${{ github.server_url }}/${{ github.repository }}/security/code-scanning)." >> $GITHUB_STEP_SUMMARY
