# =============================================================================
# CertiVault — Docker Build & Push to GHCR
# =============================================================================
# Triggers:
#   push to main        → builds images tagged :latest + :<git-sha>
#   release published   → additionally tags with the release version (e.g. :v1.2.0)
#
# Images pushed to:
#   ghcr.io/krishnx21/certivault-backend
#   ghcr.io/krishnx21/certivault-frontend
#
# Required permissions (granted via GITHUB_TOKEN — no PAT needed):
#   packages: write   → push to GHCR
#   contents: read    → checkout
#   security-events: write → upload Trivy SARIF results
#
# Multi-platform builds: linux/amd64 + linux/arm64 via Docker Buildx
# =============================================================================

name: Docker Build and Push

on:
  push:
    branches: [main]
    paths:
      # Only rebuild when source code or Docker config actually changes
      - "backend/**"
      - "frontend/**"
      - "nginx/**"
      - "docker-compose*.yml"
      - ".github/workflows/docker-build.yml"
  release:
    types: [published]
  workflow_dispatch:  # allow manual trigger

# Cancel in-progress runs on the same branch to save runner minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write  # for Trivy SARIF upload

jobs:
  # ===========================================================================
  # Build + Push: Backend
  # ===========================================================================
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest

    outputs:
      # Pass the full image ref (with digest) to downstream jobs
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx enables multi-platform builds (amd64 + arm64)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      # GITHUB_TOKEN is sufficient — no PAT required for GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags:
      #   push to main  → :latest, :<short-sha>
      #   release       → :v1.2.0, :1.2.0, :1.2, :1, :latest
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/krishnx21/certivault-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache from GHCR — speeds up subsequent builds significantly
          cache-from: type=registry,ref=ghcr.io/krishnx21/certivault-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/krishnx21/certivault-backend:buildcache,mode=max
          provenance: false  # disable attestation for simpler manifests

      # Trivy scans the pushed image for OS + package vulnerabilities.
      # Uses the image digest so we always scan the exact image just built.
      - name: Trivy — scan backend image
        id: trivy_backend
        uses: aquasecurity/trivy-action@v0.36.0
        if: steps.build.outputs.digest != ''
        continue-on-error: true   # CVE findings annotate the step but don't
                                   # retroactively fail the already-pushed build
        with:
          image-ref: ghcr.io/krishnx21/certivault-backend@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy backend results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend-image

  # ===========================================================================
  # Build + Push: Frontend
  # ===========================================================================
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/krishnx21/certivault-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Frontend build context is repo root so nginx/nginx.conf is reachable
      - name: Build and push frontend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/krishnx21/certivault-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/krishnx21/certivault-frontend:buildcache,mode=max
          provenance: false

      - name: Trivy — scan frontend image
        id: trivy_frontend
        uses: aquasecurity/trivy-action@v0.36.0
        if: steps.build.outputs.digest != ''
        continue-on-error: true
        with:
          image-ref: ghcr.io/krishnx21/certivault-frontend@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy frontend results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend-image

  # ===========================================================================
  # Notify: post a summary to the Actions run summary page
  # ===========================================================================
  notify:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "## Docker Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/krishnx21/certivault-backend\` | ${{ needs.build-backend.result == 'success' && '✅ pushed' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/krishnx21/certivault-frontend\` | ${{ needs.build-frontend.result == 'success' && '✅ pushed' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
