name: CI

on:
  pull_request:
    branches: [main, ecsoc-2026]
  push:
    branches: [main, ecsoc-2026]
  merge_group:

permissions:
  contents: read

jobs:
  backend:
    name: Backend build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      PORT: "5000"
      MONGODB_URI: mongodb://localhost:27017/certivault_test
      JWT_SECRET: ci-test-access-secret-minimum-32-chars-long
      JWT_ACCESS_SECRET: ci-test-access-secret-minimum-32-chars-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-chars-long
      JWT_ISSUER: certivault-api
      JWT_AUDIENCE: certivault-web
      FRONTEND_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test
      - run: npm run typecheck --if-present
      - run: npm run build --if-present

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm run build

  docker:
    name: Docker build compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images when Dockerfiles exist
        shell: bash
        run: |
          # Use find to avoid matching Dockerfiles inside node_modules or .git
          mapfile -t dockerfiles < <(find . -name Dockerfile \
            -not -path '*/node_modules/*' \
            -not -path '*/.git/*')
          if [ ${#dockerfiles[@]} -eq 0 ]; then
            echo "No Dockerfiles are present yet; skipping optional Docker build."
            exit 0
          fi
          for file in "${dockerfiles[@]}"; do
            dir="$(dirname "$file")"
            tag="certivault-$(echo "$dir" | tr '/.' '--' | sed 's/^-*//' ):ci"
            # The frontend Dockerfile requires repo root as build context
            if [[ "$file" == *frontend/Dockerfile ]]; then
              docker build -t "$tag" -f "$file" .
            else
              docker build -t "$tag" "$dir"
            fi
          done
