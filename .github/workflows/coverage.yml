name: Code coverage

on:
  pull_request:
    branches: [main, ecsoc-2026]
  push:
    branches: [main, ecsoc-2026]

permissions:
  contents: read

jobs:
  backend-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      PORT: "5000"
      MONGODB_URI: mongodb://localhost:27017/certivault_test
      JWT_ACCESS_SECRET: ci-test-access-secret-minimum-32-chars-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-chars-long
      JWT_ISSUER: certivault-api
      JWT_AUDIENCE: certivault-web
      FRONTEND_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run unit tests with coverage
        run: npm run test:coverage
      - name: Upload coverage when lcov exists
        if: hashFiles('backend/coverage/lcov.info') != ''
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
